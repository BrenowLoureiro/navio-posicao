name: Navio Posicao Diaria

on:
  schedule:
    - cron: '0 9 * * *'  # 09h UTC = 06h BRT
  workflow_dispatch:

jobs:
  buscar-posicao:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Buscar posicao e enviar email
        env:
          MMSI: ${{ secrets.MMSI }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DATADOCKED_API_KEY: ${{ secrets.DATADOCKED_API_KEY }}
        run: python buscar_posicao.py

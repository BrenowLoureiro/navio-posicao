name: Navio Posicao Diaria

on:
  schedule:
    - cron: '0 9 * * *'  # 09h UTC = 06h BRT
  workflow_dispatch:

jobs:
  buscar-posicao:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Buscar posicao e enviar email
        env:
          MMSI: ${{ secrets.MMSI }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DATADOCKED_API_KEY: ${{ secrets.DATADOCKED_API_KEY }}
        run: |
          python -c "
          import requests, os
          key = os.getenv('DATADOCKED_API_KEY')
          mmsi = os.getenv('MMSI')
          print(f'Key length: {len(key) if key else 0}')
          print(f'MMSI: {mmsi}')
          url = f'https://datadocked.com/api/vessels_operations/get-vessel-location?imo_or_mmsi={mmsi}'
          r = requests.get(url, headers={'x-api-key': key, 'accept': 'application/json'}, timeout=15)
          print(f'Status: {r.status_code}')
          print(f'Response: {r.text[:500]}')
          "
